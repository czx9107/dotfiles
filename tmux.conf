set -g mouse on
set-option -g allow-rename off
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind | split-window -h
bind - split-window -v
bind r source-file ~/.tmux.conf
unbind '"'
unbind %

# vim-style navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour colour99


# copy mode
setw -g mode-style 'fg=black bg=colour39 bold'

# panes
set -g pane-border-style 'fg=colour39'
set -g pane-active-border-style 'fg=colour99'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=colour39'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=colour99'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=colour39'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=colour39 bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=colour99]#F '

setw -g window-status-bell-style 'fg=colour99 bg=colour39 bold'

# messages
set -g message-style 'fg=colour99 bg=colour39 bold'

set -sg escape-time 10
